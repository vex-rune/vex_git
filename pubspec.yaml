name: vex_git
description: "VexGit - Git client for GitHub & Gitee"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Git operations - pure Dart implementation
  git_on_dart: ^0.1.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI & Utils
  path_provider: ^2.1.5
  path: ^1.9.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  intl: ^0.20.2

  # Error handling & logging
  talker: ^4.1.2
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true